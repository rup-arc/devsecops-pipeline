name: Deploy Infrastructure to Azure

# Trigger the workflow on pushes to the main branch or manually via the GitHub UI
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - plan
          - destroy

# CRUCIAL: These permissions are required for OIDC authentication to work
permissions:
  id-token: write
  contents: read

# # Define standard environment variables
# env:
#   TF_VERSION: "1.7.0" # Use a recent version of Terraform

jobs:
  # ==========================================
  # JOB 1: Provision Infrastructure (Terraform)
  # ==========================================
  terraform:
    name: 'Terraform Plan & Apply'
    runs-on: ubuntu-latest
    
    # We define standard environment variables for the Azure Provider to use OIDC securely
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        # with:
        #   terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        
      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # This step only runs for manual 'apply' or 'destroy' actions
      - name: Terraform Action
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy')
        run: terraform ${{ github.event.inputs.action }} -auto-approve -input=false
