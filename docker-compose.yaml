services:
  db:
    image: postgres:16-alpine
    container_name: jerney-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jerney_user
      POSTGRES_PASSWORD: jerney_password
      POSTGRES_DB: jerney_db
    ports:
    - "5432:5432"
    volumes:
    - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jerney_user -d jerney_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    tmpfs:
      - /tmp
      - /run


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jerney-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: jerney_user
      DB_PASSWORD: jerney_password
      DB_NAME: jerney_db
      port: "5000"
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy

    security_opt:
      - no-new-privileges:true
      readonly: true
    tmpfs:
      - /tmp   


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jerney-frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
               


volumes:
  pgdata:
    driver: local